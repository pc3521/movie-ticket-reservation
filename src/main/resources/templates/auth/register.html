<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CineBook - Register')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <div class="form-container">
        <h2>Create Account</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" th:object="${registration}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" required placeholder="Choose a username">
                <div th:if="${#fields.hasErrors('username')}" class="form-error" th:errors="*{username}"></div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" required placeholder="Enter your email">
                <div th:if="${#fields.hasErrors('email')}" class="form-error" th:errors="*{email}"></div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" required placeholder="Min 6 characters">
                <div th:if="${#fields.hasErrors('password')}" class="form-error" th:errors="*{password}"></div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" th:field="*{confirmPassword}" required placeholder="Repeat your password">
                <div th:if="${#fields.hasErrors('confirmPassword')}" class="form-error" th:errors="*{confirmPassword}"></div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Sign Up</button>
        </form>

        <p style="text-align:center; margin-top:1.5rem; color:var(--text-secondary);">
            Already have an account? <a th:href="@{/login}">Login</a>
        </p>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
