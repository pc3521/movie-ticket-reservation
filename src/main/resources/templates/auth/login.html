<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CineBook - Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <div class="form-container">
        <h2>Welcome Back</h2>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            You have been logged out.
        </div>
        <div th:if="${param.registered}" class="alert alert-success">
            Registration successful! Please log in.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Login</button>
        </form>

        <p style="text-align:center; margin-top:1.5rem; color:var(--text-secondary);">
            Don't have an account? <a th:href="@{/register}">Sign up</a>
        </p>
        <p style="text-align:center; margin-top:0.8rem; font-size:0.8rem; color:var(--text-muted);">
            Demo: admin/admin123 (Admin) · john/john123 (Customer)
        </p>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
