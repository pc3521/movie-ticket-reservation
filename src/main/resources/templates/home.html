<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('CineBook - Movies')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <div class="hero">
        <h1>Welcome to CineBook</h1>
        <p>Browse the latest screenings, pick your seats, and book your tickets in seconds.</p>
        <form th:action="@{/home}" method="get" class="search-bar">
            <input type="text" name="search" th:value="${search}" placeholder="Search movies by title...">
            <button type="submit">Search</button>
        </form>
    </div>

    <h2 class="section-title">Now Showing</h2>

    <div th:if="${#lists.isEmpty(screenings)}" class="empty-state">
        <h3>No screenings found</h3>
        <p>Check back soon for new movies!</p>
    </div>

    <div class="screening-grid">
        <div th:each="screening : ${screenings}" class="screening-card">
            <img th:src="${screening.movie.posterUrl != null ? screening.movie.posterUrl : 'https://placehold.co/300x200/1a1a2e/57068c?text=Movie'}"
                 alt="Movie poster" class="card-poster">
            <div class="card-body">
                <h3 th:text="${screening.movie.title}">Movie Title</h3>
                <div class="card-meta">
                    <span><span th:text="${#temporals.format(screening.screenTime, 'MMM dd, yyyy')}"></span></span>
                    <span><span th:text="${#temporals.format(screening.screenTime, 'hh:mm a')}"></span></span>
                    <span><span th:text="${screening.hallName}"></span></span>
                </div>
                <div class="card-meta">
                    <span th:if="${screening.movie.genre}" th:text="${screening.movie.genre}"></span>
                    <span th:if="${screening.movie.durationMinutes}" th:text="${screening.movie.durationMinutes + ' min'}"></span>
                    <span th:if="${screening.movie.rating}" th:text="${screening.movie.rating}"></span>
                </div>
                <div class="card-price" th:text="'$' + ${screening.price}"></div>
                <div class="card-actions" sec:authorize="isAuthenticated()">
                    <select id="qty" class="qty-select">
                        <option value="1">1 ticket</option>
                        <option value="2">2 tickets</option>
                        <option value="3">3 tickets</option>
                        <option value="4">4 tickets</option>
                        <option value="5">5 tickets</option>
                    </select>
                    <a th:href="@{/customer/book/{id}(id=${screening.id}, quantity=1)}"
                       class="btn btn-primary book-btn"
                       th:data-screening-id="${screening.id}">Book Now</a>
                </div>
                <div sec:authorize="!isAuthenticated()" style="margin-top: 0.5rem;">
                    <a th:href="@{/login}" class="btn btn-primary" style="width:100%;">Login to Book</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
document.querySelectorAll('.book-btn').forEach(btn => {
    const select = btn.parentElement.querySelector('.qty-select');
    if (select) {
        select.addEventListener('change', function() {
            const sid = btn.getAttribute('data-screening-id');
            btn.href = '/customer/book/' + sid + '?quantity=' + this.value;
        });
    }
});
</script>
</body>
</html>
