<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CineBook - Booking Statistics')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <h2 class="section-title">Booking Statistics</h2>
    <p style="color:var(--text-secondary); margin-bottom:1.5rem;">
        <strong th:text="${screening.movie.title}"></strong> ·
        <span th:text="${#temporals.format(screening.screenTime, 'MMM dd, yyyy hh:mm a')}"></span> ·
        <span th:text="${screening.hallName}"></span>
    </p>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" th:text="${totalSeats}">80</div>
            <div class="stat-label">Total Seats</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" th:text="${occupiedSeats}">0</div>
            <div class="stat-label">Occupied</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" th:text="${totalSeats - occupiedSeats}">80</div>
            <div class="stat-label">Available</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" th:text="${totalSeats > 0 ? (occupiedSeats * 100 / totalSeats) + '%' : '0%'}">0%</div>
            <div class="stat-label">Occupancy</div>
        </div>
    </div>

    <div style="margin-bottom:2rem;">
        <h3 style="margin-bottom:0.5rem; font-size:1rem;">Occupancy</h3>
        <div class="occupancy-bar">
            <div class="occupancy-fill" th:style="'width:' + ${totalSeats > 0 ? (occupiedSeats * 100 / totalSeats) : 0} + '%'"></div>
        </div>
    </div>

    <!-- Seat Map Visualization -->
    <div class="seat-map-container" style="margin-bottom:2rem;">
        <div class="screen-indicator"></div>
        <div id="seatGrid"></div>
        <div class="seat-legend">
            <div class="legend-item"><div class="legend-box legend-available"></div> Available</div>
            <div class="legend-item"><div class="legend-box legend-booked"></div> Booked</div>
        </div>
    </div>

    <h3 style="margin-bottom:1rem; font-size:1.1rem;">Booking Details</h3>

    <div th:if="${#lists.isEmpty(bookings)}" class="empty-state" style="padding:2rem;">
        <p>No bookings for this screening yet.</p>
    </div>

    <div th:if="${!#lists.isEmpty(bookings)}" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Ref</th>
                    <th>Customer</th>
                    <th>Seats</th>
                    <th>Amount</th>
                    <th>Booking Status</th>
                    <th>Payment Status</th>
                    <th>Booked At</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.bookingRef}"></td>
                    <td th:text="${booking.user.username}"></td>
                    <td>
                        <span th:each="seat, iter : ${booking.bookedSeats}">
                            <span th:text="${seat.seatLabel}"></span><span th:if="${!iter.last}">, </span>
                        </span>
                    </td>
                    <td th:text="'$' + ${booking.totalAmount}"></td>
                    <td>
                        <span class="badge" th:classappend="${booking.bookingStatus.name() == 'CONFIRMED' ? 'badge-confirmed' : 'badge-cancelled'}"
                              th:text="${booking.bookingStatus}"></span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${booking.paymentStatus.name() == 'PAID' ? 'badge-paid' : 'badge-refunded'}"
                              th:text="${booking.paymentStatus}"></span>
                    </td>
                    <td th:text="${#temporals.format(booking.createdAt, 'MMM dd, hh:mm a')}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="margin-top:1.5rem;">
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">← Back to Dashboard</a>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:inline="javascript">
const totalRows = [[${screening.totalRows}]];
const seatsPerRow = [[${screening.seatsPerRow}]];
const bookedSeatsData = [[${bookedSeats}]];

const bookedSet = new Set();
bookedSeatsData.forEach(s => bookedSet.add(s.row + '-' + s.number));

const grid = document.getElementById('seatGrid');
for (let r = 1; r <= totalRows; r++) {
    const row = document.createElement('div');
    row.className = 'seat-row';
    const label = document.createElement('div');
    label.className = 'row-label';
    label.textContent = String.fromCharCode(64 + r);
    row.appendChild(label);
    for (let s = 1; s <= seatsPerRow; s++) {
        const seat = document.createElement('div');
        seat.className = 'seat';
        seat.textContent = s;
        seat.style.cursor = 'default';
        if (bookedSet.has(r + '-' + s)) {
            seat.classList.add('seat-booked');
        }
        row.appendChild(seat);
    }
    grid.appendChild(row);
}
</script>
</body>
</html>
