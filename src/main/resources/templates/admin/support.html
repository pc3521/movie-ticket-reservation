<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CineBook - Support')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <h2 class="section-title">Support Chat Requests</h2>

    <h3 style="margin:1.5rem 0 1rem; color:var(--warning);">Pending Requests</h3>
    <div th:if="${#lists.isEmpty(pendingSessions)}" class="empty-state" style="padding:2rem;">
        <p>No pending chat requests.</p>
    </div>
    <div th:if="${!#lists.isEmpty(pendingSessions)}" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Session ID</th>
                    <th>Customer</th>
                    <th>Opened At</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="session : ${pendingSessions}">
                    <td th:text="${session.id}"></td>
                    <td th:text="${session.customer.username}"></td>
                    <td th:text="${#temporals.format(session.createdAt, 'MMM dd, hh:mm a')}"></td>
                    <td><span class="badge badge-pending" th:text="${session.status}"></span></td>
                    <td><a th:href="@{/admin/chat/{id}(id=${session.id})}" class="btn btn-success btn-sm">Join Chat</a></td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 style="margin:2rem 0 1rem; color:var(--success);">Active Sessions</h3>
    <div th:if="${#lists.isEmpty(activeSessions)}" class="empty-state" style="padding:2rem;">
        <p>No active chat sessions.</p>
    </div>
    <div th:if="${!#lists.isEmpty(activeSessions)}" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Session ID</th>
                    <th>Customer</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="session : ${activeSessions}">
                    <td th:text="${session.id}"></td>
                    <td th:text="${session.customer.username}"></td>
                    <td>
                        <span class="badge" th:classappend="${session.status.name() == 'ACTIVE' ? 'badge-active' : 'badge-pending'}"
                              th:text="${session.status}"></span>
                    </td>
                    <td><a th:href="@{/admin/chat/{id}(id=${session.id})}" class="btn btn-primary btn-sm">Open Chat</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
