<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CineBook - Profile')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <div class="profile-card">
        <div class="profile-avatar" th:text="${user.username.substring(0,1).toUpperCase()}"></div>
        <h2 th:text="${user.username}">Username</h2>
        <div class="profile-info">
            <p><strong>Username:</strong> <span th:text="${user.username}"></span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
            <p><strong>Role:</strong>
                <span class="badge" th:classappend="${user.role.name() == 'ADMIN' ? 'badge-active' : 'badge-confirmed'}"
                      th:text="${user.role}"></span>
            </p>
            <p><strong>Member Since:</strong> <span th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}"></span></p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
