# ===========================================
# Movie Ticket Reservation System
# ===========================================

spring.application.name=movie-ticket-system

# ------ H2 Database (Development - works out of the box) ------
spring.datasource.url=jdbc:h2:file:./data/movieticketdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------ MySQL (Production - uncomment and configure) ------
# spring.datasource.url=jdbc:mysql://localhost:3306/movie_ticket_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL use: org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=8080

# Logging
logging.level.com.movieticket=DEBUG
