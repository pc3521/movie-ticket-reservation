<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CineBook - Edit Screening')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <div class="form-container" style="max-width:550px;">
        <h2>Edit Screening</h2>

        <form th:action="@{/admin/edit-screening/{id}(id=${screeningDto.id})}" method="post" th:object="${screeningDto}">
            <div class="form-group">
                <label>Movie</label>
                <input type="text" th:value="${screeningDto.movieTitle}" disabled
                       style="opacity:0.6;">
            </div>
            <div class="form-group">
                <label>Screening Date & Time</label>
                <input type="datetime-local" th:field="*{screenTime}" required>
            </div>
            <div class="form-group">
                <label>Hall Name</label>
                <input type="text" th:field="*{hallName}">
            </div>
            <div class="form-group">
                <label>Ticket Price ($)</label>
                <input type="number" step="0.01" th:field="*{price}" required>
            </div>

            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary" style="flex:1; text-align:center;">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex:1;">Save Changes</button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
