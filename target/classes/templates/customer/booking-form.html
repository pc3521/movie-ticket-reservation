<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CineBook - Booking')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <div class="form-container" style="max-width:550px;">
        <h2>Confirm Booking</h2>

        <div class="confirmation-details">
            <p><strong>Movie:</strong> <span th:text="${screening.movie.title}"></span></p>
            <p><strong>Date:</strong> <span th:text="${#temporals.format(screening.screenTime, 'EEEE, MMM dd, yyyy')}"></span></p>
            <p><strong>Time:</strong> <span th:text="${#temporals.format(screening.screenTime, 'hh:mm a')}"></span></p>
            <p><strong>Hall:</strong> <span th:text="${screening.hallName}"></span></p>
            <p><strong>Tickets:</strong> <span th:text="${quantity}"></span></p>
            <p><strong>Price per Ticket:</strong> <span th:text="'$' + ${screening.price}"></span></p>
            <p style="font-size:1.1rem;"><strong>Total:</strong> <span style="color:var(--accent); font-weight:700;" th:text="'$' + ${totalPrice}"></span></p>
        </div>

        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
            <a th:href="@{/customer/dashboard}" class="btn btn-secondary" style="flex:1; text-align:center;">Cancel</a>
            <a th:href="@{/customer/select-seats/{id}(id=${screening.id}, quantity=${quantity})}"
               class="btn btn-primary" style="flex:1; text-align:center;">Select Seats →</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
