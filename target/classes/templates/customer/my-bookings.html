<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CineBook - My Bookings')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="main-content">
    <h2 class="section-title">My Bookings</h2>

    <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
        <h3>No bookings yet</h3>
        <p>Browse movies and book your first ticket!</p>
        <a th:href="@{/customer/dashboard}" class="btn btn-primary" style="margin-top:1rem;">Browse Movies</a>
    </div>

    <div th:if="${!#lists.isEmpty(bookings)}" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Ref</th>
                    <th>Movie</th>
                    <th>Date & Time</th>
                    <th>Seats</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Payment</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.bookingRef}"></td>
                    <td th:text="${booking.screening.movie.title}"></td>
                    <td th:text="${#temporals.format(booking.screening.screenTime, 'MMM dd, hh:mm a')}"></td>
                    <td>
                        <span th:each="seat, iter : ${booking.bookedSeats}">
                            <span th:text="${seat.seatLabel}"></span><span th:if="${!iter.last}">, </span>
                        </span>
                    </td>
                    <td th:text="'$' + ${booking.totalAmount}"></td>
                    <td>
                        <span class="badge" th:classappend="${booking.bookingStatus.name() == 'CONFIRMED' ? 'badge-confirmed' : 'badge-cancelled'}"
                              th:text="${booking.bookingStatus}"></span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${booking.paymentStatus.name() == 'PAID' ? 'badge-paid' : 'badge-refunded'}"
                              th:text="${booking.paymentStatus}"></span>
                    </td>
                    <td>
                        <button th:if="${booking.bookingStatus.name() == 'CONFIRMED'}"
                                class="btn btn-danger btn-sm cancel-btn"
                                th:data-booking-id="${booking.id}">Cancel</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
document.querySelectorAll('.cancel-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        if (!confirm('Are you sure you want to cancel this booking?')) return;
        const id = this.dataset.bookingId;
        fetch('/api/bookings/cancel/' + id, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.reload();
                } else {
                    alert('Error: ' + data.error);
                }
            });
    });
});
</script>
</body>
</html>
