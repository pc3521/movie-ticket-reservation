<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== HEAD FRAGMENT ===== -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Movie Ticket System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<!-- ===== NAVBAR FRAGMENT ===== -->
<nav th:fragment="navbar" class="navbar">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand">
            CineBook
        </a>
        <div class="nav-links">
            <!-- Public -->
            <a th:href="@{/home}" sec:authorize="!isAuthenticated()">Home</a>
            <a th:href="@{/login}" sec:authorize="!isAuthenticated()" class="btn-nav">Login</a>
            <a th:href="@{/register}" sec:authorize="!isAuthenticated()" class="btn-nav btn-register">Sign Up</a>

            <!-- Customer -->
            <a th:href="@{/customer/dashboard}" sec:authorize="hasRole('CUSTOMER')">Browse Movies</a>
            <a th:href="@{/customer/bookings}" sec:authorize="hasRole('CUSTOMER')">My Bookings</a>
            <a th:href="@{/chat}" sec:authorize="hasRole('CUSTOMER')">Support Chat</a>
            <a th:href="@{/customer/profile}" sec:authorize="hasRole('CUSTOMER')">Profile</a>

            <!-- Admin -->
            <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')">Dashboard</a>
            <a th:href="@{/admin/add-screening}" sec:authorize="hasRole('ADMIN')">Add Screening</a>
            <a th:href="@{/admin/support}" sec:authorize="hasRole('ADMIN')">Support</a>
            <a th:href="@{/admin/profile}" sec:authorize="hasRole('ADMIN')">Profile</a>

            <!-- Logout -->
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="nav-logout">
                <span class="nav-user" sec:authentication="name"></span>
                <button type="submit" class="btn-nav btn-logout">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!-- ===== FOOTER FRAGMENT ===== -->
<footer th:fragment="footer" class="footer">
    <div class="footer-container">
        <p>&copy; 2025 CineBook Movie Ticket Reservation System | pc3521</p>
    </div>
</footer>

</html>
